services:
  - type: web
    name: utm-sequia-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 180 --graceful-timeout 30 --keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: OMP_NUM_THREADS
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MODEL_DIR
        value: models
      - key: MODEL_XGB
        value: xgb_t1_estricta_ex_ante_sinmun.json
